---
# Role: kernel_boot

- name: Secure Bootloader Files
  when: hardening_bootloader_perms | bool
  block:
    - name: Set permissions on GRUB files
      ansible.builtin.file:
        path: "{{ item.path }}"
        owner: root
        group: root
        mode: "{{ item.mode }}"
      loop:
        - { path: "/boot/grub2/user.cfg", mode: "0600" }
        - { path: "/boot/grub2/grub.cfg", mode: "0600" }
      failed_when: false

- name: Kernel and Process Hardening
  when: hardening_sysctl | bool
  block:
    - name: Configure sysctl process hardening
      ansible.builtin.copy:
        dest: /etc/sysctl.d/60-process-hardening.conf
        content: |
          kernel.randomize_va_space = 2
          kernel.yama.ptrace_scope = 1
          fs.suid_dumpable = 0
          kernel.dmesg_restrict = 1
          kernel.kptr_restrict = 2
          fs.protected_hardlinks = 1
          fs.protected_symlinks = 1
        mode: '0644'
        owner: root
        group: root
      notify: Reload sysctl

- name: Restrict Core Dumps
  when: hardening_coredump | bool
  block:
    - name: Ensure coredump conf directory exists
      ansible.builtin.file:
        path: /etc/systemd/coredump.conf.d
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: Disable Core Dumps
      ansible.builtin.copy:
        dest: /etc/systemd/coredump.conf.d/60-coredump.conf
        content: |
          [Coredump]
          Storage=none
          ProcessSizeMax=0
        mode: '0644'
        owner: root
        group: root

- name: Auditd Configuration
  when: hardening_auditd | bool
  block:
    - name: Install auditd and audispd-plugins
      ansible.builtin.dnf:
        name:
          - audit
          - audispd-plugins
        state: present

    - name: Ensure auditd service is enabled
      ansible.builtin.systemd:
        name: auditd
        enabled: yes

    - name: Get grubby kernel info
      ansible.builtin.command: grubby --info=ALL
      register: grubby_info
      changed_when: false

    - name: Remove selinux=0 or enforcing=0 from grub
      ansible.builtin.command: grubby --update-kernel ALL --remove-args "selinux=0 enforcing=0"
      when: "'selinux=0' in grubby_info.stdout or 'enforcing=0' in grubby_info.stdout"

    - name: Add audit=1 to grub
      ansible.builtin.command: grubby --update-kernel ALL --args 'audit=1'
      when: "'audit=1' not in grubby_info.stdout"

    - name: Deploy CIS auditd rules
      ansible.builtin.copy:
        src: 60-cis-auditd.rules
        dest: /etc/audit/rules.d/60-cis-auditd.rules
        mode: '0640'
        owner: root
        group: root
      notify: Restart auditd

    - name: Load auditd rules
      ansible.builtin.command: augenrules --load
      changed_when: false
      failed_when: false

    - name: Configure auditd daemon options
      ansible.builtin.lineinfile:
        path: /etc/audit/auditd.conf
        regexp: "^{{ item.key }}.*"
        line: "{{ item.key }} = {{ item.value }}"
      loop:
        - { key: "max_log_file_action", value: "keep_logs" }
        - { key: "space_left_action", value: "email" }
        - { key: "action_mail_acct", value: "root" }
        - { key: "admin_space_left_action", value: "halt" }
      notify: Restart auditd

- name: Configure Journald
  when: hardening_journald | bool
  block:
    - name: Ensure journald conf.d directory exists
      ansible.builtin.file:
        path: /etc/systemd/journald.conf.d
        state: directory
        mode: '0755'
        owner: root
        group: root
        
    - name: Deploy Journald config
      ansible.builtin.copy:
        src: 60-cis-journald.conf
        dest: /etc/systemd/journald.conf.d/60-cis-journald.conf
        mode: '0644'
        owner: root
        group: root
      notify: Restart systemd-journald
